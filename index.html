<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💌 给我最好的朋友</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #f48fb1 60%, #fce4ec 100%);
    font-family: 'Georgia', '楷体', 'KaiTi', serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: default;
    user-select: none;
  }

  /* ===== 背景氛围词 ===== */
  .bg-words-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .bg-word {
    position: absolute;
    font-size: 22px;
    animation: wordFloat linear infinite;
    opacity: 0.35;
    white-space: nowrap;
    color: #d81b60;
    font-weight: bold;
  }

  @keyframes wordFloat {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.8); opacity: 0; }
    10%  { opacity: 0.35; }
    90%  { opacity: 0.35; }
    100% { transform: translateY(-10vh) rotate(15deg) scale(1); opacity: 0; }
  }

  /* ===== 飘落的爱心粒子 ===== */
  .hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .heart-particle {
    position: absolute;
    font-size: 24px;
    animation: fall linear infinite;
    opacity: 0.7;
  }

  @keyframes fall {
    0%   { transform: translateY(-10%) rotate(0deg); opacity: 0.9; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
  }

  /* ===== 主卡片 ===== */
  .main-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 50px 40px 40px;
    max-width: 520px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
    transition: transform 0.3s;
  }

  .main-card.hidden { display: none; }

  .main-card h1 {
    font-size: 2em;
    color: #d81b60;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }

  .main-card .subtitle {
    color: #ad1457;
    font-size: 0.95em;
    margin-bottom: 30px;
    opacity: 0.8;
  }

  /* ===== 信的内容 ===== */
  .letter {
    text-align: left;
    line-height: 2;
    color: #4a148c;
    font-size: 1.05em;
    margin-bottom: 35px;
    padding: 20px 24px;
    background: linear-gradient(135deg, #fce4ec40, #f8bbd040);
    border-radius: 16px;
    border-left: 3px solid #f48fb1;
  }

  .letter .line {
    opacity: 0;
    transform: translateX(-20px);
    animation: fadeInLine 0.6s ease forwards;
  }

  .letter .line:nth-child(1) { animation-delay: 0.3s; }
  .letter .line:nth-child(2) { animation-delay: 0.8s; }
  .letter .line:nth-child(3) { animation-delay: 1.3s; }
  .letter .line:nth-child(4) { animation-delay: 1.8s; }
  .letter .line:nth-child(5) { animation-delay: 2.3s; }
  .letter .line:nth-child(6) { animation-delay: 2.8s; }

  @keyframes fadeInLine {
    to { opacity: 1; transform: translateX(0); }
  }

  .letter .signature {
    text-align: right;
    margin-top: 12px;
    opacity: 0;
    animation: fadeInLine 0.6s 3.5s ease forwards;
  }

  /* ===== 按钮 ===== */
  .surprise-btn {
    display: inline-block;
    padding: 14px 40px;
    font-size: 1.1em;
    color: #fff;
    background: linear-gradient(135deg, #f48fb1, #d81b60);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: inherit;
    transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(216,27,96,0.3);
    opacity: 0;
    animation: fadeInLine 0.6s 4.0s ease forwards;
  }

  .surprise-btn:hover {
    transform: scale(1.06);
    box-shadow: 0 10px 30px rgba(216,27,96,0.4);
  }

  .surprise-btn:active {
    transform: scale(0.97);
  }

  /* ===== 游戏容器 ===== */
  .game-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 5;
  }

  .game-container.hidden { display: none; }

  /* 游戏 HUD */
  .game-hud {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    padding: 12px 28px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }

  .game-hud .score-text {
    font-size: 1.1em;
    color: #d81b60;
    letter-spacing: 1px;
  }

  .game-hud .score-bar-wrap {
    width: 200px;
    height: 10px;
    background: #fce4ec;
    border-radius: 10px;
    overflow: hidden;
  }

  .game-hud .score-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #f48fb1, #d81b60);
    border-radius: 10px;
    transition: width 0.3s;
  }

  .game-hint {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    color: #d81b60;
    font-size: 1.1em;
    letter-spacing: 2px;
    z-index: 6;
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50%     { opacity: 1;   transform: translateX(-50%) scale(1.05); }
  }

  /* 可点击的爱心 */
  .clickable-heart {
    position: absolute;
    font-size: 40px;
    cursor: pointer;
    transition: transform 0.1s;
    z-index: 6;
    animation: heartPop 0.6s ease-out, heartFloat 3s ease-in-out infinite;
    filter: drop-shadow(0 2px 8px rgba(216,27,96,0.3));
  }

  .clickable-heart:hover {
    transform: scale(1.3);
  }

  .clickable-heart:active {
    transform: scale(1.5);
  }

  @keyframes heartPop {
    0%   { transform: scale(0); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  @keyframes heartFloat {
    0%,100% { margin-top: 0; }
    50%     { margin-top: -15px; }
  }

  /* 收集特效 */
  .collect-effect {
    position: absolute;
    font-size: 20px;
    pointer-events: none;
    z-index: 7;
    animation: collectUp 0.8s ease-out forwards;
  }

  @keyframes collectUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(1.5); }
  }

  /* ===== 通关弹窗 ===== */
  .win-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .win-overlay.hidden { display: none; }

  .win-card {
    background: rgba(255,255,255,0.95);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    animation: heartPop 0.6s ease-out;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }

  .win-card h2 {
    font-size: 1.8em;
    color: #d81b60;
    margin-bottom: 10px;
  }

  .win-card p {
    color: #4a148c;
    margin-bottom: 24px;
    font-size: 1.1em;
  }

  .win-card .win-btn {
    padding: 12px 36px;
    font-size: 1em;
    color: #fff;
    background: linear-gradient(135deg, #f48fb1, #d81b60);
    border: none;
    border-radius: 50px;
    cursor: pointer;
    letter-spacing: 2px;
    font-family: inherit;
    transition: all 0.3s;
    box-shadow: 0 6px 20px rgba(216,27,96,0.3);
  }

  .win-card .win-btn:hover {
    transform: scale(1.06);
  }

  /* ===== 倒计时覆盖层 ===== */
  .countdown-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .countdown-overlay.hidden { display: none; }

  .countdown-number {
    font-size: 8em;
    color: #fff;
    font-weight: bold;
    text-shadow: 0 0 40px rgba(255,255,255,0.5);
    animation: countPop 0.6s ease;
  }

  @keyframes countPop {
    0%   { transform: scale(0.3); opacity: 0; }
    60%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  .countdown-text {
    position: absolute;
    bottom: 25%;
    font-size: 1.5em;
    color: #f48fb1;
    letter-spacing: 4px;
    animation: fadeInLine 0.5s ease forwards;
  }

  /* ===== 视频全屏层 ===== */
  .video-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }

  .video-overlay.hidden { display: none; }

  .video-overlay video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* 关闭提示（极不明显） */
  .video-overlay .close-hint {
    position: absolute;
    bottom: 10px;
    right: 10px;
    color: #222;
    font-size: 10px;
    opacity: 0.3;
    cursor: default;
  }
</style>
</head>
<body>

<!-- 背景氛围词 -->
<div class="bg-words-container" id="bgWords"></div>

<!-- 飘落爱心 -->
<div class="hearts-container" id="hearts"></div>

<!-- 主卡片 -->
<div class="main-card" id="mainCard">
  <h1>💕 521</h1>
  <p class="subtitle">—— 给我最好的朋友</p>

  <div class="letter">
    <p class="line">亲爱的 Dee：</p>
    <p class="line">今天是 5 月 21 日，一个特别的日子。</p>
    <p class="line">我想借这个机会告诉你——</p>
    <p class="line">能遇到你是我最幸运的事。</p>
    <p class="line">谢谢你一直以来的陪伴和温暖 💗</p>
    <p class="line">所以……我给你准备了一份小惊喜！</p>
    <p class="signature" style="color:#d81b60;">—— 娜娜 ✨</p>
  </div>

  <button class="surprise-btn" id="surpriseBtn" onclick="startGame()">
    🎁 点击查看惊喜礼物 🎁
  </button>
</div>

<!-- 游戏容器 -->
<div class="game-container hidden" id="gameContainer">
  <div class="game-hud">
    <span class="score-text">💗 已收集</span>
    <span class="score-text" id="scoreNum" style="font-weight:bold;">0</span>
    <span class="score-text">/ 10</span>
    <div class="score-bar-wrap">
      <div class="score-bar-fill" id="scoreBar" style="width:0%"></div>
    </div>
  </div>
  <div class="game-hint" id="gameHint">👆 点击飘动的爱心来收集它们吧！</div>
</div>

<!-- 通关弹窗 -->
<div class="win-overlay hidden" id="winOverlay">
  <div class="win-card">
    <h2>🎉 太棒了！</h2>
    <p>你收集了所有的爱心！<br>真正的惊喜来了……</p>
    <button class="win-btn" onclick="startCountdown()">🌟 揭晓惊喜 🌟</button>
  </div>
</div>

<!-- 倒计时层 -->
<div class="countdown-overlay hidden" id="countdownOverlay">
  <div class="countdown-number" id="countdownNum">3</div>
  <div class="countdown-text">✨ 惊喜即将揭晓 ✨</div>
</div>

<!-- 视频层 -->
<div class="video-overlay hidden" id="videoOverlay">
  <video id="scareVideo" autoplay playsinline></video>
  <span class="close-hint">.</span>
</div>

<script>
  // ===== 背景氛围词 =====
  const bgWordsContainer = document.getElementById('bgWords');
  const bgTexts = [
    '宝宝', '我爱你', '最喜欢你了', 'Dee ♡', '❤️', '💗', '💕', '💖', '💝', '✨',
    '(｡･ω･｡)ﾉ♡', '(◍•ᴗ•◍)❤', '♡＾▽＾♡', '(⁄ ⁄>⁄ ▽ ⁄<⁄ ⁄)', 'ฅ^•ﻌ•^ฅ',
    '(´▽`ʃ♡ƪ)', '(๑˘︶˘๑)', '(✿◠‿◠)', '٩(◕‿◕｡)۶', '(づ｡◕‿‿◕｡)づ',
    '╰(*´︶`*)╯♡', '(｡♥‿♥｡)', '♪(´ε｀ )', '(//∇//)', '♡(｡- ω -)',
    '最好的朋友', '嘿嘿', 'Dee 最棒啦', '今天是521', '(♡°▽°♡)',
    '每一天都要开心', '生日快乐', '友谊长存', '爱你哟～', '💌',
    '(つ✧ω✧)つ', '🎀', '🌸', '🌷', '🩷', '永远的好朋友'
  ];

  function createBgWord() {
    const el = document.createElement('span');
    el.className = 'bg-word';
    el.textContent = bgTexts[Math.floor(Math.random() * bgTexts.length)];
    el.style.left = Math.random() * 90 + '%';
    el.style.fontSize = (16 + Math.random() * 18) + 'px';
    el.style.animationDuration = (12 + Math.random() * 15) + 's';
    el.style.animationDelay = Math.random() * 5 + 's';
    el.style.color = ['#d81b60','#ad1457','#e91e63','#c2185b','#f06292'][Math.floor(Math.random()*5)];
    bgWordsContainer.appendChild(el);

    setTimeout(() => el.remove(), 20000);
  }

  for (let i = 0; i < 20; i++) {
    setTimeout(createBgWord, i * 300);
  }
  setInterval(createBgWord, 1000);

  // ===== 飘落爱心粒子 =====
  const heartsContainer = document.getElementById('hearts');
  const heartEmojis = ['💕', '💗', '💖', '💝', '🌸', '✨', '🩷', '💌'];

  function createHeart() {
    const el = document.createElement('span');
    el.className = 'heart-particle';
    el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    el.style.left = Math.random() * 100 + '%';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = Math.random() * 5 + 's';
    el.style.fontSize = (18 + Math.random() * 20) + 'px';
    heartsContainer.appendChild(el);
    setTimeout(() => el.remove(), 15000);
  }

  for (let i = 0; i < 20; i++) {
    setTimeout(createHeart, i * 300);
  }
  setInterval(createHeart, 800);

  // ===== 小游戏 =====
  const TARGET_SCORE = 10;
  let gameScore = 0;
  let gameActive = false;
  let heartSpawnTimer = null;

  const gameContainer = document.getElementById('gameContainer');
  const scoreNum = document.getElementById('scoreNum');
  const scoreBar = document.getElementById('scoreBar');
  const gameHint = document.getElementById('gameHint');
  const winOverlay = document.getElementById('winOverlay');
  const mainCard = document.getElementById('mainCard');

  function startGame() {
    mainCard.classList.add('hidden');
    gameContainer.classList.remove('hidden');
    gameScore = 0;
    gameActive = true;
    updateScore();

    // 开始生成可点击爱心
    heartSpawnTimer = setInterval(spawnClickableHeart, 600);

    // 初始一次生成 5 个
    for (let i = 0; i < 5; i++) {
      setTimeout(spawnClickableHeart, i * 150);
    }
  }

  function spawnClickableHeart() {
    if (!gameActive) return;

    const el = document.createElement('span');
    el.className = 'clickable-heart';
    const hearts = ['💗', '💖', '💝', '🩷', '💕', '🫶'];
    el.textContent = hearts[Math.floor(Math.random() * hearts.length)];
    el.style.left = (5 + Math.random() * 85) + '%';
    el.style.top = (10 + Math.random() * 75) + '%';
    el.style.fontSize = (35 + Math.random() * 25) + 'px';
    el.style.animationDelay = Math.random() * 1.5 + 's';

    el.addEventListener('click', function(e) {
      if (!gameActive) return;
      collectHeart(el, e);
    });

    // 触摸事件（手机端）
    el.addEventListener('touchstart', function(e) {
      if (!gameActive) return;
      e.preventDefault();
      collectHeart(el, e.touches[0]);
    }, {passive: false});

    gameContainer.appendChild(el);

    // 8 秒后自动消失
    setTimeout(() => {
      if (el.parentNode) el.remove();
    }, 8000);
  }

  function collectHeart(el, event) {
    gameScore++;
    updateScore();

    // 收集特效
    const effect = document.createElement('span');
    effect.className = 'collect-effect';
    effect.textContent = ['+1', '💗', '✨', '٩(ˊᗜˋ*)و'][Math.floor(Math.random() * 4)];
    effect.style.left = (event.clientX || event.pageX) + 'px';
    effect.style.top = (event.clientY || event.pageY) + 'px';
    gameContainer.appendChild(effect);
    setTimeout(() => effect.remove(), 800);

    // 移除爱心
    el.style.transform = 'scale(1.5)';
    el.style.opacity = '0';
    el.style.transition = 'all 0.2s';
    setTimeout(() => el.remove(), 200);

    // 提示文字变化
    const hints = [
      '好棒！继续收集！💗',
      '加油加油～',
      'Dee 真厉害！',
      '还差一点点哦～',
      '٩(◕‿◕｡)۶',
      '太厉害了！',
      '快完成了！✨'
    ];
    gameHint.textContent = hints[Math.min(gameScore - 1, hints.length - 1)];

    // 检查通关
    if (gameScore >= TARGET_SCORE) {
      gameWin();
    }
  }

  function updateScore() {
    scoreNum.textContent = gameScore;
    scoreBar.style.width = (gameScore / TARGET_SCORE * 100) + '%';
  }

  function gameWin() {
    gameActive = false;
    clearInterval(heartSpawnTimer);

    // 清除剩余的爱心
    document.querySelectorAll('.clickable-heart').forEach(el => el.remove());

    gameHint.textContent = '🎉 全部收集完了！';

    // 延迟弹出通关弹窗
    setTimeout(() => {
      winOverlay.classList.remove('hidden');
    }, 500);
  }

  // ===== 倒计时 → 视频 =====
  function startCountdown() {
    winOverlay.classList.add('hidden');
    const overlay = document.getElementById('countdownOverlay');
    const numEl = document.getElementById('countdownNum');

    overlay.classList.remove('hidden');

    let count = 3;
    numEl.textContent = count;
    triggerAnim(numEl);

    const timer = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(timer);
        playScareVideo();
        return;
      }
      numEl.textContent = count;
      triggerAnim(numEl);
    }, 800);
  }

  function triggerAnim(el) {
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = 'countPop 0.6s ease';
  }

  function playScareVideo() {
    const countdownOverlay = document.getElementById('countdownOverlay');
    const videoOverlay = document.getElementById('videoOverlay');
    const video = document.getElementById('scareVideo');

    countdownOverlay.classList.add('hidden');
    video.src = 'scare.mp4';
    videoOverlay.classList.remove('hidden');
    video.load();
    video.play().catch((e) => {
      console.error('视频播放失败:', e);
    });

    // 视频结束后重置
    video.onended = () => {
      videoOverlay.classList.add('hidden');
      // 回到主卡片
      mainCard.classList.remove('hidden');
      gameContainer.classList.add('hidden');
      gameScore = 0;
      gameActive = false;
      updateScore();
      gameHint.textContent = '👆 点击飘动的爱心来收集它们吧！';
      scoreBar.style.width = '0%';
      scoreNum.textContent = '0';
    };
  }
</script>

</body>
</html>
